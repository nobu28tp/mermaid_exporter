<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Exporter - 高機能図表作成・出力ツール</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Mermaid.js -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .font-mono-code {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex flex-col transition-colors duration-200">

    <!-- ヘッダー -->
    <header class="sticky top-0 z-40 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="p-2 bg-gradient-to-tr from-brand-500 to-indigo-500 rounded-xl text-white shadow-md shadow-brand-500/20">
                    <i data-lucide="share-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-brand-600 to-indigo-600 dark:from-brand-400 dark:to-indigo-400 bg-clip-text text-transparent">
                        Mermaid Exporter
                    </h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 hidden sm:block">シンプルで美しい、図表作成・画像出力システム</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- テンプレート選択 -->
                <div class="relative inline-block text-left">
                    <button id="template-btn" class="flex items-center space-x-1 px-3.2 py-2 text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 bg-white dark:bg-slate-900 shadow-sm transition">
                        <i data-lucide="layout" class="w-4 h-4 text-slate-500"></i>
                        <span>テンプレート</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                    </button>
                    <!-- ドロップダウンメニュー -->
                    <div id="template-menu" class="hidden absolute right-0 mt-2 w-56 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl z-50 py-1 font-sans text-sm animate-in fade-in slide-in-from-top-2 duration-150">
                        <button onclick="loadTemplate('flowchart')" class="w-full text-left px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-950/30 hover:text-brand-600 dark:hover:text-brand-400 flex items-center space-x-2 border-b border-slate-100 dark:border-slate-700/50 pb-1.5 mb-1.5">
                            <i data-lucide="git-fork" class="w-4 h-4"></i>
                            <span>フローチャート（業務プロセス）</span>
                        </button>
                        <button onclick="loadTemplate('sequence')" class="w-full text-left px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-950/30 hover:text-brand-600 dark:hover:text-brand-400 flex items-center space-x-2">
                            <i data-lucide="arrow-right-left" class="w-4 h-4"></i>
                            <span>シーケンス図（API連携）</span>
                        </button>
                        <button onclick="loadTemplate('class')" class="w-full text-left px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-950/30 hover:text-brand-600 dark:hover:text-brand-400 flex items-center space-x-2">
                            <i data-lucide="layers" class="w-4 h-4"></i>
                            <span>クラス図（データ構造）</span>
                        </button>
                        <button onclick="loadTemplate('gantt')" class="w-full text-left px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-950/30 hover:text-brand-600 dark:hover:text-brand-400 flex items-center space-x-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                            <span>ガントチャート（工程管理）</span>
                        </button>
                        <button onclick="loadTemplate('mindmap')" class="w-full text-left px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-950/30 hover:text-brand-600 dark:hover:text-brand-400 flex items-center space-x-2 border-b border-slate-100 dark:border-slate-700/50 pb-1.5 mb-1.5">
                            <i data-lucide="network" class="w-4 h-4"></i>
                            <span>マインドマップ</span>
                        </button>
                        <!-- Markdown Table テンプレート -->
                        <button onclick="loadTemplate('markdownTable')" class="w-full text-left px-4 py-2 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 text-brand-600 dark:text-brand-400 font-medium flex items-center space-x-2">
                            <i data-lucide="table" class="w-4 h-4"></i>
                            <span>Markdownテーブル（表）</span>
                        </button>
                    </div>
                </div>

                <!-- ダークモード切り替え -->
                <button id="theme-toggle" class="p-2 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 shadow-sm transition" title="テーマ切り替え">
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-6 overflow-hidden">
        
        <!-- 左半分: エディタ部 & 保存マネージャー / GitHub -->
        <section class="flex-1 flex flex-col min-w-0 gap-4 overflow-hidden min-h-[500px] lg:min-h-0">
            <!-- エディタ本体カード -->
            <div class="flex-1 flex flex-col bg-white dark:bg-slate-950 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                <!-- エディタヘッダー -->
                <div class="px-4 py-3 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span id="editor-indicator-color" class="flex h-2.5 w-2.5 rounded-full bg-brand-500"></span>
                        <h2 id="editor-title-text" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mermaid Editor</h2>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button onclick="copyToClipboard()" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800 rounded transition" title="コードをコピー">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <button onclick="clearEditor()" class="p-1.5 text-slate-500 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/20 rounded transition" title="クリア">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                
                <!-- エディタ本体 -->
                <div id="editor-container" class="flex-1 flex overflow-hidden font-mono-code relative bg-slate-950">
                    <!-- 行番号 -->
                    <div id="line-numbers" class="w-12 text-right pr-3 pt-4 select-none text-slate-600 bg-slate-950/80 border-r border-slate-900 text-xs leading-6 overflow-hidden">
                        <!-- JavaScriptで動的生成 -->
                    </div>
                    <!-- テキストエリア -->
                    <textarea id="editor" class="flex-1 p-4 pl-3 resize-none outline-none text-sm leading-6 bg-transparent text-slate-300 whitespace-pre overflow-auto focus:ring-0" spellcheck="false" placeholder="ここにMermaidコード、または「| 項目 | 状況 |」などのMarkdownテーブルを入力してください..."></textarea>
                </div>

                <!-- ステータスバー -->
                <div class="px-4 py-2 bg-slate-50 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-xs text-slate-500">
                    <div id="editor-stats">行: 1 | 文字数: 0</div>
                    <div id="render-status" class="flex items-center space-x-1 text-emerald-500">
                        <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>
                        <span>正常</span>
                    </div>
                </div>
            </div>

            <!-- タブ切り替え保存コントロール -->
            <div class="bg-white dark:bg-slate-950 rounded-2xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col gap-3">
                <!-- タブヘッダー -->
                <div class="flex border-b border-slate-100 dark:border-slate-900 pb-2 justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="switchTab('local')" id="tab-local-btn" class="px-3 py-1 text-xs font-semibold rounded-lg bg-brand-50 dark:bg-brand-950/40 text-brand-600 dark:text-brand-400 flex items-center gap-1.5 transition">
                            <i data-lucide="folder-heart" class="w-3.5 h-3.5"></i>
                            <span>マイリスト & ローカル</span>
                        </button>
                        <button onclick="switchTab('github')" id="tab-github-btn" class="px-3 py-1 text-xs font-semibold rounded-lg text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 flex items-center gap-1.5 transition">
                            <i data-lucide="github" class="w-3.5 h-3.5"></i>
                            <span>GitHub保存・上書き</span>
                        </button>
                    </div>
                </div>

                <!-- タブ1: マイリスト・ローカルファイル保存 -->
                <div id="tab-local-content" class="flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">ローカルバックアップ</span>
                        <div class="flex items-center gap-2">
                            <input type="file" id="import-file" class="hidden" accept=".mermaid,.txt,.md" onchange="importMermaidFile(event)">
                            <button onclick="document.getElementById('import-file').click()" class="text-xs text-slate-500 hover:text-brand-500 flex items-center gap-1 transition" title="ファイルから読み込み">
                                <i data-lucide="file-up" class="w-3.5 h-3.5"></i>
                                <span>インポート</span>
                            </button>
                            <button onclick="exportMermaidFile()" class="text-xs text-slate-500 hover:text-brand-500 flex items-center gap-1 transition" title="現在のコードをファイルでダウンロード">
                                <i data-lucide="file-down" class="w-3.5 h-3.5"></i>
                                <span>ファイル保存</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="save-name-input" placeholder="保存する名前を入力..." class="flex-1 px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                        <button onclick="saveToMyList()" class="px-3 py-1.5 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-xs font-semibold flex items-center gap-1 transition shrink-0 shadow-sm shadow-brand-500/10">
                            <i data-lucide="save" class="w-3.5 h-3.5"></i>
                            <span>リストに新規保存</span>
                        </button>
                    </div>

                    <div class="border-t border-slate-100 dark:border-slate-900 pt-2">
                        <p class="text-[11px] text-slate-400 mb-2">保存済み図表一覧（ブラウザに記憶されます）</p>
                        <div id="mylist-container" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto pr-1">
                            <span class="text-xs text-slate-400 italic">保存された図表はまだありません</span>
                        </div>
                    </div>
                </div>

                <!-- タブ2: GitHub保存・上書き (新設) -->
                <div id="tab-github-content" class="hidden flex flex-col gap-3">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2.5">
                        <!-- アクセストークン -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                <span>GitHub パーソナルアクセストークン (PAT)</span>
                                <a href="https://github.com/settings/tokens/new" target="_blank" class="text-brand-500 hover:underline flex items-center gap-0.5">
                                    <span>取得</span><i data-lucide="external-link" class="w-2.5 h-2.5"></i>
                                </a>
                            </label>
                            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" class="px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                        </div>
                        <!-- リポジトリパス (owner/repo) -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-slate-400">リポジトリパス (owner/repo)</label>
                            <input type="text" id="gh-repo" placeholder="username/my-diagrams" class="px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                        </div>
                        <!-- 保存先ファイルパス -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-slate-400">コミット先ファイル名（パス）</label>
                            <input type="text" id="gh-path" placeholder="diagrams/system-flow.mermaid" class="px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                        </div>
                        <!-- ブランチ名 -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-slate-400">ブランチ名</label>
                            <input type="text" id="gh-branch" value="main" placeholder="main" class="px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                        </div>
                    </div>

                    <!-- コミットメッセージ -->
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-400">コミットメッセージ</label>
                        <input type="text" id="gh-message" placeholder="Update diagram via Mermaid Exporter" class="px-3 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand-500">
                    </div>

                    <!-- 保存アクション -->
                    <div class="flex justify-between items-center mt-1 pt-2 border-t border-slate-100 dark:border-slate-900">
                        <span class="text-[10px] text-slate-400">※GitHubへの直接接続のため、データは当ブラウザ内のみで処理されます。</span>
                        <button onclick="commitToGitHub()" id="gh-commit-btn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-xs font-semibold flex items-center gap-1.5 transition shadow-sm">
                            <i data-lucide="git-commit" class="w-3.5 h-3.5"></i>
                            <span id="gh-btn-text">GitHubに保存（新規/上書き）</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右半分: プレビュー & エクスポート -->
        <section class="flex-1 flex flex-col min-w-0 bg-white dark:bg-slate-950 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
            <!-- プレビューヘッダー -->
            <div class="px-4 py-3 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i data-lucide="eye" class="w-4 h-4 text-slate-500"></i>
                    <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-300">Preview</h2>
                </div>
                <div class="flex items-center space-x-2">
                    <!-- ズーム操作 -->
                    <div class="flex items-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-0.5 shadow-sm text-xs">
                        <button onclick="adjustZoom(0.8)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition" title="縮小">
                            <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                        </button>
                        <span id="zoom-level" class="px-2 font-medium min-w-[40px] text-center">100%</span>
                        <button onclick="adjustZoom(1.2)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition" title="拡大">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        </button>
                        <button onclick="resetZoom()" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition border-l border-slate-200 dark:border-slate-700 ml-0.5" title="位置と拡大率を元に戻す">
                            <i data-lucide="maximize" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>

                    <!-- 手動更新 -->
                    <button onclick="renderDiagram(true)" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-800 rounded transition" title="プレビューを再生成">
                        <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- プレビュー描画領域 -->
            <div id="preview-viewport" class="flex-1 relative bg-slate-100 dark:bg-slate-900/60 overflow-hidden cursor-grab active:cursor-grabbing flex items-center justify-center min-h-[350px]">
                
                <!-- グリッド背景装飾 -->
                <div class="absolute inset-0 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] dark:bg-[radial-gradient(#334155_1px,transparent_1px)] [background-size:16px_16px] pointer-events-none opacity-60"></div>
                
                <!-- ドラッグ＆ズームが反映されるコンテナ -->
                <div id="preview-container" class="relative transition-transform duration-75 ease-out select-none flex items-center justify-center origin-center">
                    <!-- ここにMermaid、またはMarkdown TableのSVGが描画されます -->
                </div>

                <!-- エラー表示オーバーレイ -->
                <div id="error-overlay" class="hidden absolute inset-0 bg-red-950/10 backdrop-blur-sm flex items-center justify-center p-6">
                    <div class="bg-white dark:bg-slate-900 border-l-4 border-red-500 p-4 rounded-r-xl shadow-xl max-w-md w-full animate-in fade-in zoom-in-95 duration-150">
                        <div class="flex items-start space-x-3">
                            <div class="p-1 bg-red-100 dark:bg-red-950 rounded-lg text-red-600 dark:text-red-400">
                                <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm font-bold text-red-800 dark:text-red-400">文法エラーを検出しました</h3>
                                <p id="error-message" class="mt-1 text-xs text-red-600 dark:text-red-300 font-mono-code break-words max-h-32 overflow-y-auto">
                                    Syntax Error...
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ガイド表示 -->
                <div class="absolute bottom-3 left-3 bg-white/85 dark:bg-slate-850/85 backdrop-blur px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-800 text-[10px] text-slate-500 pointer-events-none flex items-center space-x-1 shadow-sm">
                    <i data-lucide="move" class="w-3.5 h-3.5"></i>
                    <span>ドラッグして移動 / ホイールで拡大縮小</span>
                </div>
            </div>

            <!-- エクスポートフッター -->
            <div class="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex flex-wrap gap-3 items-center justify-between">
                <!-- オプション項目 -->
                <div class="flex items-center space-x-4">
                    <label class="flex items-center space-x-2 text-xs font-medium text-slate-600 dark:text-slate-400 cursor-pointer">
                        <input type="checkbox" id="transparent-bg" class="rounded text-brand-500 focus:ring-brand-500 dark:bg-slate-800 dark:border-slate-700" checked>
                        <span>画像出力（SVG/PNG）時に背景を透過にする</span>
                    </label>
                </div>

                <!-- ダウンロードボタン群 -->
                <div class="flex items-center space-x-2">
                    <button id="download-svg-btn" onclick="exportSVG()" class="inline-flex items-center space-x-1.5 px-4 py-2 bg-slate-800 hover:bg-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700 text-white rounded-lg text-xs font-semibold shadow-sm transition">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        <span>SVGで保存</span>
                    </button>
                    <button id="download-png-btn" onclick="exportPNG()" class="inline-flex items-center space-x-1.5 px-4 py-2 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-lg text-xs font-semibold shadow-md shadow-brand-500/15 transition">
                        <i data-lucide="image" class="w-4 h-4"></i>
                        <span>PNGで保存</span>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- コピー完了通知用トースト -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-10 opacity-0 pointer-events-none bg-slate-900 dark:bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2.5 text-sm transition-all duration-300">
        <div class="p-1 bg-brand-500 rounded-lg text-white">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <span id="toast-message">コピーしました！</span>
    </div>

    <!-- JavaScript ロジック -->
    <script>
        // デフォルトの業務フローテンプレート
        const defaultFlowchart = `graph LR
%% 1. コスト削減と効率化
subgraph Cost ["1. コス卜削減と効率化（推進状況の共有化）"]
    direction TB
    D1[自治体A] -- 割り勘 --> EL[公共財としての共通基準]
    D2[自治体B] -- 割り勘 --> EL
    D3[自治体C] -- 割り勘 --> EL
end

%% 2. 広域DXと均一化
subgraph DX ["2. 広域DXの推進とサービス水準の均一化"]
    direction TB
    F1[小規模自治体]
    F1 --> H1[エリアデータ連携基盤]
    G1[大規模自治体] --> H1
    H1 --> I1(["[均一化] どこでも同じ水準 of サービス"])
    H1 --> J1(["[広域DX] 自治体間のデータ連携"])
end

%% コスト削減から広域DXへの接続
EL --> F1`;

        // Markdown Table のテンプレート
        const defaultMarkdownTable = `| 施策名 | 担当府省 | 推進ステータス | 概算予算 (R8年度) |
| :--- | :---: | :---: | ---: |
| ガバメントクラウド移行 | デジタル庁 | 進行中 (順調) | 2,400 億円 |
| 自治体システム標準化支援 | 総務省 / デジ庁 | 計画策定完了 | 850 億円 |
| マイナンバーカード機能拡充 | 総務省 | テスト運用中 | 120 億円 |
| 全国データ連携基盤の整備 | 国土交通省 | 要件定義中 | 45 億円 |`;

        // テンプレート定義
        const templates = {
            flowchart: defaultFlowchart,
            sequence: `sequenceDiagram
    autonumber
    actor User as 利用者
    participant App as モバイルアプリ
    participant API as APIゲートウェイ
    participant DB as データベース

    User->>App: ログイン要求 (ID, PW入力)
    App->>API: POST /auth/login
    activate API
    API->>DB: ユーザー情報取得
    activate DB
    DB-->>API: ハッシュ化パスワード
    deactivate DB
    
    alt 認証成功
        API-->>App:アクセストークン (JWT)
        App-->>User: ホーム画面遷移
    else パスワード不一致
        API-->>App: 401 Unauthorized
        App-->>User: エラーメッセージ表示
    end
    deactivate API`,
            class: `classDiagram
    class User {
        +String userId
        +String email
        +String passwordHash
        +login()
        +logout()
    }
    class Document {
        +String docId
        +String title
        +String content
        +Date createdAt
        +save()
        +delete()
    }
    class ShareSettings {
        +Boolean isPublic
        +List allowedUsers
        +updatePermission()
    }
    User "1" --> "0..*" Document : 所有
    Document "1" *-- "1" ShareSettings : 構成`,
            gantt: `gantt
    title システムリプレイス計画
    dateFormat  YYYY-MM-DD
    section 要件定義
    要件整理・ヒアリング     :active, req1, 2026-06-01, 10d
    基本設計合意            : req2, after req1, 5d
    section 開発フェーズ
    DB設計・基盤構築        :crit, dev1, after req2, 7d
    フロントエンド開発      : dev2, after dev1, 14d
    バックエンドAPI実装     : dev3, after dev1, 12d
    section テスト・導入
    結合テスト              : test1, after dev2, 7d
    移行リハーサル          : test2, after test1, 3d
    本番リリース            :milestone, active, 2026-07-10, 0d`,
            mindmap: `mindmap
  root((デジタル庁DX))
    共通化
      ガバメントクラウド
      共通API
      UIデザインシステム
    効率化
      マイナンバーカード
      自治体共通基盤
      ペーパーレス
    データ連携
      エリアデータ連携
      オープンデータ
      セキュリティ強靭化`,
            markdownTable: defaultMarkdownTable
        };

        // アプリケーション状態
        let currentZoom = 1;
        let isDragging = false;
        let startX, startY;
        let panX = 0;
        let panY = 0;
        let renderTimeout = null;

        // DOM要素
        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('line-numbers');
        const previewContainer = document.getElementById('preview-container');
        const previewViewport = document.getElementById('preview-viewport');
        const errorOverlay = document.getElementById('error-overlay');
        const errorMessage = document.getElementById('error-message');
        const renderStatus = document.getElementById('render-status');
        const templateBtn = document.getElementById('template-btn');
        const templateMenu = document.getElementById('template-menu');
        const themeToggle = document.getElementById('theme-toggle');

        // 安全な初期化関数
        function initializeAppSafe() {
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: document.documentElement.classList.contains('dark') ? 'dark' : 'default',
                    securityLevel: 'loose',
                    flowchart: { useMaxWidth: false, htmlLabels: true },
                    sequence: { useMaxWidth: false },
                    gantt: { useMaxWidth: false }
                });

                // 新規立ち上げ・ロード時は常に空文字でスタートする
                editor.value = '';

                updateLineNumbers();
                updateStats();
                
                // マイリスト一覧を表示
                renderMyList();

                // GitHub設定をLocalStorageから読み込み復元
                loadGitHubConfig();

                // 描画を実行（エディタが空のため何も表示されない状態になる）
                renderDiagram(true);

                // ResizeObserverを使ってプレビュー表示領域のサイズ変化を監視
                const resizeObserver = new ResizeObserver(() => {
                    fitDiagramToViewport();
                });
                resizeObserver.observe(previewViewport);

            } else {
                setTimeout(initializeAppSafe, 100);
            }
        }

        // 初期ロードイベント
        window.addEventListener('load', () => {
            lucide.createIcons();
            initializeAppSafe();

            // 入力監視
            editor.addEventListener('input', () => {
                updateLineNumbers();
                updateStats();
                
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => {
                    renderDiagram();
                }, 300);
            });

            // 行スクロールの同期
            editor.addEventListener('scroll', () => {
                lineNumbers.scrollTop = editor.scrollTop;
            });

            setupTheme();

            // テンプレート選択
            templateBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                templateMenu.classList.toggle('hidden');
            });
            document.addEventListener('click', () => {
                templateMenu.classList.add('hidden');
            });

            setupDragAndZoom();
        });

        // テーマ切替
        function setupTheme() {
            if (localStorage.getItem('theme') === 'dark' || 
                (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            themeToggle.addEventListener('click', () => {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                    reinitMermaidTheme('default');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                    reinitMermaidTheme('dark');
                }
            });
        }

        function reinitMermaidTheme(themeName) {
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: themeName,
                    securityLevel: 'loose',
                    flowchart: { useMaxWidth: false, htmlLabels: true },
                    sequence: { useMaxWidth: false },
                    gantt: { useMaxWidth: false }
                });
                renderDiagram(true);
            }
        }

        // 行番号の動的生成
        function updateLineNumbers() {
            const lines = editor.value.split('\n');
            const lineCount = Math.max(lines.length, 1);
            let numbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                numbersHtml += `<div>${i}</div>`;
            }
            lineNumbers.innerHTML = numbersHtml;
            lineNumbers.scrollTop = editor.scrollTop;
        }

        // 統計更新
        function updateStats() {
            const lines = editor.value.split('\n').length;
            const chars = editor.value.length;
            document.getElementById('editor-stats').textContent = `行: ${lines} | 文字数: ${chars}`;
        }

        // 入力されたコードがMarkdownテーブル形式か判別するヘルパー
        function isMarkdownTable(code) {
            const trimmed = code.trim();
            if (!trimmed) return false;
            
            // 行に分割して最初の非空行を取得
            const lines = trimmed.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length === 0) return false;
            
            // 最初行が | で始まっているか
            return lines[0].startsWith('|');
        }

        // 全角・半角を考慮した正確な文字表示幅の計算（全角=2, 半角=1）
        function getVisualLength(str) {
            let len = 0;
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i);
                if ((code >= 0x00 && code < 0x81) || code === 0xf8f0 || (code >= 0xff61 && code < 0xffa0)) {
                    len += 1;
                } else {
                    len += 2;
                }
            }
            return len;
        }

        // Markdown Tableを解析して美しいSVGとしてレンダリングする独自エンジン
        function renderMarkdownTable(code) {
            const lines = code.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // ヘッダーとデータ行のパース
            let rawHeaders = [];
            let rawRows = [];
            let alignments = []; // left, center, right

            // 各セルの区切りをパースするヘルパー
            function parseCells(line) {
                let val = line;
                if (val.startsWith('|')) val = val.slice(1);
                if (val.endsWith('|')) val = val.slice(0, -1);
                return val.split('|').map(s => s.trim());
            }

            if (lines.length > 0) {
                rawHeaders = parseCells(lines[0]);
            }

            // 2行目がセパレーター行
            let startIndex = 1;
            if (lines.length > 1 && lines[1].includes('-')) {
                const sepCells = parseCells(lines[1]);
                alignments = sepCells.map(cell => {
                    const left = cell.startsWith(':');
                    const right = cell.endsWith(':');
                    if (left && right) return 'center';
                    if (right) return 'right';
                    return 'left';
                });
                startIndex = 2;
            } else {
                alignments = new Array(rawHeaders.length).fill('left');
            }

            // データ行の蓄積
            for (let i = startIndex; i < lines.length; i++) {
                const cells = parseCells(lines[i]);
                while (cells.length < rawHeaders.length) cells.push('');
                rawRows.push(cells.slice(0, rawHeaders.length));
            }

            // --- 各列の最大幅を算出 ---
            const colWidths = new Array(rawHeaders.length).fill(0);
            for (let col = 0; col < rawHeaders.length; col++) {
                let maxLen = getVisualLength(rawHeaders[col]);
                for (let row = 0; row < rawRows.length; row++) {
                    const len = getVisualLength(rawRows[row][col]);
                    if (len > maxLen) maxLen = len;
                }
                colWidths[col] = Math.max(maxLen * 8.5 + 36, 110);
            }

            const totalWidth = colWidths.reduce((a, b) => a + b, 0);
            const headerHeight = 54;
            const rowHeight = 48;
            const totalHeight = headerHeight + (rawRows.length * rowHeight);

            // ダークモード判定
            const isDark = document.documentElement.classList.contains('dark');
            const colorTheme = {
                bg: isDark ? '#0f172a' : '#ffffff',
                headerBg: isDark ? '#1e1b4b' : '#f5f3ff',
                headerText: isDark ? '#c084fc' : '#5b21b6',
                text: isDark ? '#cbd5e1' : '#1e293b',
                border: isDark ? '#334155' : '#e2e8f0'
            };

            // SVG生成開始
            let svgString = `<svg viewBox="0 0 ${totalWidth} ${totalHeight}" width="${totalWidth}" height="${totalHeight}" xmlns="http://www.w3.org/2000/svg" style="font-family:'Noto Sans JP',sans-serif; background-color:${colorTheme.bg}; border-radius:12px; overflow:hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">`;
            svgString += `<rect width="100%" height="100%" fill="${colorTheme.bg}"/>`;
            svgString += `<rect x="0" y="0" width="${totalWidth}" height="${headerHeight}" fill="${colorTheme.headerBg}"/>`;

            let currentX = 0;
            for (let col = 0; col < rawHeaders.length; col++) {
                const w = colWidths[col];
                const align = alignments[col];
                let textX = currentX + 18;
                let anchor = 'start';

                if (align === 'center') {
                    textX = currentX + (w / 2);
                    anchor = 'middle';
                } else if (align === 'right') {
                    textX = currentX + w - 18;
                    anchor = 'end';
                }

                svgString += `<text x="${textX}" y="${headerHeight / 2 + 5}" fill="${colorTheme.headerText}" font-size="14" font-weight="700" text-anchor="${anchor}">${rawHeaders[col]}</text>`;
                if (col > 0) {
                    svgString += `<line x1="${currentX}" y1="0" x2="${currentX}" y2="${headerHeight}" stroke="${colorTheme.border}" stroke-width="1"/>`;
                }
                currentX += w;
            }

            svgString += `<line x1="0" y1="${headerHeight}" x2="${totalWidth}" y2="${headerHeight}" stroke="${colorTheme.border}" stroke-width="1.5"/>`;

            for (let row = 0; row < rawRows.length; row++) {
                const y = headerHeight + (row * rowHeight);
                if (row % 2 === 1) {
                    const stripeFill = isDark ? '#1e293b' : '#f8fafc';
                    svgString += `<rect x="0" y="${y}" width="${totalWidth}" height="${rowHeight}" fill="${stripeFill}"/>`;
                }

                currentX = 0;
                for (let col = 0; col < rawHeaders.length; col++) {
                    const w = colWidths[col];
                    const align = alignments[col];
                    const val = rawRows[row][col];
                    let textX = currentX + 18;
                    let anchor = 'start';

                    if (align === 'center') {
                        textX = currentX + (w / 2);
                        anchor = 'middle';
                    } else if (align === 'right') {
                        textX = currentX + w - 18;
                        anchor = 'end';
                    }

                    svgString += `<text x="${textX}" y="${y + (rowHeight / 2) + 5}" fill="${colorTheme.text}" font-size="13" font-weight="500" text-anchor="${anchor}">${val}</text>`;
                    if (col > 0) {
                        svgString += `<line x1="${currentX}" y1="${y}" x2="${currentX}" y2="${y + rowHeight}" stroke="${colorTheme.border}" stroke-width="1"/>`;
                    }
                    currentX += w;
                }
                svgString += `<line x1="0" y1="${y + rowHeight}" x2="${totalWidth}" y2="${y + rowHeight}" stroke="${colorTheme.border}" stroke-width="1"/>`;
            }

            svgString += `<rect x="0" y="0" width="${totalWidth}" height="${totalHeight}" fill="none" stroke="${colorTheme.border}" stroke-width="1.5"/>`;
            svgString += `</svg>`;

            return svgString;
        }

        // Mermaidレンダリングメイン処理
        async function renderDiagram(forceAutoFit = false) {
            const code = editor.value.trim();
            localStorage.setItem('mermaid_code', editor.value);

            const titleText = document.getElementById('editor-title-text');
            const indicator = document.getElementById('editor-indicator-color');

            if (!code) {
                previewContainer.innerHTML = '';
                hideError();
                titleText.textContent = "Editor";
                indicator.className = "flex h-2.5 w-2.5 rounded-full bg-brand-500";
                return;
            }

            if (isMarkdownTable(code)) {
                titleText.textContent = "Markdown Table Editor";
                indicator.className = "flex h-2.5 w-2.5 rounded-full bg-indigo-500";
                
                try {
                    const svgString = renderMarkdownTable(code);
                    previewContainer.innerHTML = svgString;
                    adjustSvgStyles();
                    hideError();
                    setRenderStatus(true);

                    if (forceAutoFit) {
                        setTimeout(fitDiagramToViewport, 50);
                    }
                } catch (tableErr) {
                    console.error(tableErr);
                    showError("Markdownテーブルの解析中にエラーが発生しました。");
                    setRenderStatus(false);
                }
                return;
            }

            titleText.textContent = "Mermaid Editor";
            indicator.className = "flex h-2.5 w-2.5 rounded-full bg-brand-500";

            if (typeof mermaid === 'undefined') return;

            try {
                await mermaid.parse(code);
                const id = 'mermaid-svg-' + Math.random().toString(36).substring(2, 9);
                const { svg } = await mermaid.render(id, code);
                
                previewContainer.innerHTML = svg;
                adjustSvgStyles();
                hideError();
                setRenderStatus(true);

                if (forceAutoFit) {
                    setTimeout(fitDiagramToViewport, 50);
                }
            } catch (err) {
                console.error(err);
                showError(err.message || '描画中にエラーが発生しました。構文を確認してください。');
                setRenderStatus(false);
            }
        }

        // SVG本来の描画サイズがCSSのauto指定などで潰れないように、親コンテナサイズを完全同期する
        function adjustSvgStyles() {
            const svgElement = previewContainer.querySelector('svg');
            if (svgElement) {
                let viewBox = svgElement.getAttribute('viewBox');
                if (!viewBox) {
                    const w = svgElement.getAttribute('width') || "800";
                    const h = svgElement.getAttribute('height') || "600";
                    viewBox = `0 0 ${w.replace('px', '')} ${h.replace('px', '')}`;
                    svgElement.setAttribute('viewBox', viewBox);
                }

                const parts = viewBox.split(/[ ,]+/);
                if (parts.length === 4) {
                    const vbWidth = parseFloat(parts[2]);
                    const vbHeight = parseFloat(parts[3]);
                    svgElement.style.width = '100%';
                    svgElement.style.height = '100%';
                    svgElement.style.maxWidth = 'none';
                    svgElement.style.maxHeight = 'none';
                    previewContainer.style.width = vbWidth + 'px';
                    previewContainer.style.height = vbHeight + 'px';
                }
                svgElement.style.display = 'block';
            }
        }

        // プレビュー領域に図をジャストフィットさせる
        function fitDiagramToViewport() {
            const svgElement = previewContainer.querySelector('svg');
            if (!svgElement) return;

            const viewportWidth = previewViewport.clientWidth;
            const viewportHeight = previewViewport.clientHeight;
            
            const svgWidth = parseFloat(previewContainer.style.width) || 800;
            const svgHeight = parseFloat(previewContainer.style.height) || 600;

            if (viewportWidth < 100 || viewportHeight < 100) {
                currentZoom = 1;
                panX = 0;
                panY = 0;
                applyTransform();
                return;
            }

            const widthScale = (viewportWidth - 40) / svgWidth;
            const heightScale = (viewportHeight - 40) / svgHeight;
            let targetScale = Math.min(widthScale, heightScale, 1.2);

            if (targetScale <= 0 || isNaN(targetScale)) targetScale = 1;

            currentZoom = targetScale;
            panX = 0;
            panY = 0;

            applyTransform();
        }

        // エラー表示
        function showError(msg) {
            errorMessage.textContent = msg;
            errorOverlay.classList.remove('hidden');
        }

        function hideError() {
            errorOverlay.classList.add('hidden');
        }

        function setRenderStatus(success) {
            if (success) {
                renderStatus.innerHTML = `<i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i><span>正常</span>`;
                renderStatus.className = "flex items-center space-x-1 text-emerald-500 font-medium";
            } else {
                renderStatus.innerHTML = `<i data-lucide="x-circle" class="w-3.5 h-3.5"></i><span>エラー</span>`;
                renderStatus.className = "flex items-center space-x-1 text-red-500 font-medium";
            }
            lucide.createIcons();
        }

        // テンプレート読み込み
        function loadTemplate(type) {
            if (templates[type]) {
                editor.value = templates[type];
                updateLineNumbers();
                updateStats();
                renderDiagram(true);
                showToast("テンプレートを適用しました");
            }
        }

        // コピー機能
        function copyToClipboard() {
            const code = editor.value;
            if (!code) return;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(() => {
                    showToast("コードをクリップボードにコピーしました！");
                }).catch(() => {
                    fallbackCopyText(code);
                });
            } else {
                fallbackCopyText(code);
            }
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("コードをクリップボードにコピーしました！");
            } catch (err) {
                showToast("コピーに失敗しました。");
            }
            document.body.removeChild(textArea);
        }

        // エディタのクリア
        function clearEditor() {
            editor.value = '';
            updateLineNumbers();
            updateStats();
            previewContainer.innerHTML = '';
            hideError();
            setRenderStatus(true);
        }

        // ドラッグ＆ズーム
        function setupDragAndZoom() {
            previewViewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 1.08;
                if (e.deltaY < 0) {
                    currentZoom = Math.min(currentZoom * zoomFactor, 6);
                } else {
                    currentZoom = Math.max(currentZoom / zoomFactor, 0.15);
                }
                applyTransform();
            }, { passive: false });

            previewViewport.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // タッチイベント対応
            previewViewport.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - panX;
                    startY = e.touches[0].clientY - panY;
                }
            });

            previewViewport.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                panX = e.touches[0].clientX - startX;
                panY = e.touches[0].clientY - startY;
                applyTransform();
            });

            previewViewport.addEventListener('touchend', () => {
                isDragging = false;
            });
        }

        // トランスフォーム反映
        function applyTransform() {
            previewContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
            document.getElementById('zoom-level').textContent = `${Math.round(currentZoom * 100)}%`;
        }

        function adjustZoom(factor) {
            currentZoom = Math.min(Math.max(currentZoom * factor, 0.15), 6);
            applyTransform();
        }

        function resetZoom() {
            fitDiagramToViewport();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.className = "fixed bottom-6 right-6 z-50 transform translate-y-0 opacity-100 bg-slate-950 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2.5 text-sm transition-all duration-300";
            
            setTimeout(() => {
                toast.className = "fixed bottom-6 right-6 z-50 transform translate-y-10 opacity-0 pointer-events-none bg-slate-950 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2.5 text-sm transition-all duration-300";
            }, 3000);
        }

        // ==========================================
        //  マイリスト保存・管理ロジック
        // ==========================================
        
        function getMyList() {
            const listStr = localStorage.getItem('mermaid_mylist');
            return listStr ? JSON.parse(listStr) : {};
        }

        function saveToMyList() {
            const nameInput = document.getElementById('save-name-input');
            const name = nameInput.value.trim();
            const code = editor.value;

            if (!name) {
                showToast("保存する名前を入力してください。");
                return;
            }
            if (!code.trim()) {
                showToast("保存する図表データ（コード）がありません。");
                return;
            }

            const currentList = getMyList();
            currentList[name] = code;
            localStorage.setItem('mermaid_mylist', JSON.stringify(currentList));
            
            nameInput.value = '';
            renderMyList();
            showToast(`「${name}」をマイリストに保存したよ！`);
        }

        function loadFromMyList(name) {
            const currentList = getMyList();
            if (currentList[name]) {
                editor.value = currentList[name];
                updateLineNumbers();
                updateStats();
                renderDiagram(true);
                showToast(`「${name}」を読み込んだよ！`);
            }
        }

        function deleteFromMyList(e, name) {
            e.stopPropagation();
            
            const currentList = getMyList();
            if (currentList[name]) {
                delete currentList[name];
                localStorage.setItem('mermaid_mylist', JSON.stringify(currentList));
                renderMyList();
                showToast(`「${name}」を削除したよ！`);
            }
        }

        function renderMyList() {
            const container = document.getElementById('mylist-container');
            const list = getMyList();
            const keys = Object.keys(list);

            if (keys.length === 0) {
                container.innerHTML = `<span class="text-xs text-slate-400 italic">保存された図表はまだありません</span>`;
                return;
            }

            container.innerHTML = keys.map(key => `
                <div onclick="loadFromMyList('${key}')" class="group flex items-center gap-1.5 px-3 py-1 bg-brand-50 hover:bg-brand-100 dark:bg-brand-950/30 dark:hover:bg-brand-950/60 border border-brand-100 dark:border-brand-900/60 text-brand-700 dark:text-brand-300 rounded-full text-xs font-medium cursor-pointer transition">
                    <span>${key}</span>
                    <button onclick="deleteFromMyList(event, '${key}')" class="text-brand-400 hover:text-red-500 rounded-full hover:bg-white dark:hover:bg-slate-900 p-0.5 transition" title="この保存データを削除">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // ==========================================
        //  タブ切り替えUIロジック (新機能)
        // ==========================================
        function switchTab(tabId) {
            const localBtn = document.getElementById('tab-local-btn');
            const githubBtn = document.getElementById('tab-github-btn');
            const localContent = document.getElementById('tab-local-content');
            const githubContent = document.getElementById('tab-github-content');

            if (tabId === 'local') {
                localBtn.className = "px-3 py-1 text-xs font-semibold rounded-lg bg-brand-50 dark:bg-brand-950/40 text-brand-600 dark:text-brand-400 flex items-center gap-1.5 transition";
                githubBtn.className = "px-3 py-1 text-xs font-semibold rounded-lg text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 flex items-center gap-1.5 transition";
                localContent.classList.remove('hidden');
                githubContent.classList.add('hidden');
            } else if (tabId === 'github') {
                githubBtn.className = "px-3 py-1 text-xs font-semibold rounded-lg bg-brand-50 dark:bg-brand-950/40 text-brand-600 dark:text-brand-400 flex items-center gap-1.5 transition";
                localBtn.className = "px-3 py-1 text-xs font-semibold rounded-lg text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 flex items-center gap-1.5 transition";
                githubContent.classList.remove('hidden');
                localContent.classList.add('hidden');
            }
        }

        // ==========================================
        //  GitHub保存・上書きロジック (新機能)
        // ==========================================
        function saveGitHubConfig() {
            const token = document.getElementById('gh-token').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const path = document.getElementById('gh-path').value.trim();
            const branch = document.getElementById('gh-branch').value.trim();
            const message = document.getElementById('gh-message').value.trim();

            const config = { token, repo, path, branch, message };
            localStorage.setItem('mermaid_github_config', JSON.stringify(config));
        }

        function loadGitHubConfig() {
            const configStr = localStorage.getItem('mermaid_github_config');
            if (configStr) {
                const config = JSON.parse(configStr);
                document.getElementById('gh-token').value = config.token || '';
                document.getElementById('gh-repo').value = config.repo || '';
                document.getElementById('gh-path').value = config.path || '';
                document.getElementById('gh-branch').value = config.branch || 'main';
                document.getElementById('gh-message').value = config.message || '';
            }
        }

        // GitHub APIへのコミット処理
        async function commitToGitHub() {
            const token = document.getElementById('gh-token').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const path = document.getElementById('gh-path').value.trim();
            const branch = document.getElementById('gh-branch').value.trim() || 'main';
            let message = document.getElementById('gh-message').value.trim();
            const code = editor.value;

            // バリデーション
            if (!token) {
                showToast("GitHubトークンを入力してね！");
                return;
            }
            if (!repo || !repo.includes('/')) {
                showToast("リポジトリ名 (owner/repo形式) を入力してね！");
                return;
            }
            if (!path) {
                showToast("コミット先ファイル名（パス）を入力してね！");
                return;
            }
            if (!code.trim()) {
                showToast("コミットするコード（テキスト）がありません。");
                return;
            }

            // デフォルトのコミットメッセージ
            if (!message) {
                message = "Update diagram via Mermaid Exporter";
            }

            // ローカル保存
            saveGitHubConfig();

            // UIをローディング状態にする
            const commitBtn = document.getElementById('gh-commit-btn');
            const btnText = document.getElementById('gh-btn-text');
            commitBtn.disabled = true;
            btnText.textContent = "接続中・コミット処理中...";

            try {
                // UTF-8対応のBase64エンコード
                const base64Content = btoa(unescape(encodeURIComponent(code)));

                // 1. 既存ファイルが保存先にあるかGETしてチェック（上書きの場合はSHAが必要なため）
                const checkUrl = `https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`;
                const headers = {
                    "Authorization": `token ${token}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Content-Type": "application/json"
                };

                let fileSha = null;
                const checkRes = await fetch(checkUrl, { headers });

                if (checkRes.ok) {
                    // すでにファイルが存在するので上書きのためにSHAを取得
                    const fileData = await checkRes.json();
                    fileSha = fileData.sha;
                } else if (checkRes.status !== 404) {
                    // 404（存在しない）以外のエラーが返ってきたら権限などの不具合
                    const errData = await checkRes.json();
                    throw new Error(errData.message || "リポジトリ情報の取得に失敗したよ。");
                }

                // 2. コミット実行（PUTメソッド）
                const commitBody = {
                    message: message,
                    content: base64Content,
                    branch: branch
                };
                if (fileSha) {
                    commitBody.sha = fileSha; // 上書き時に必須のSHAを付与
                }

                const putUrl = `https://api.github.com/repos/${repo}/contents/${path}`;
                const putRes = await fetch(putUrl, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify(commitBody)
                });

                if (!putRes.ok) {
                    const putErrData = await putRes.json();
                    throw new Error(putErrData.message || "コミットの送信に失敗したよ。");
                }

                showToast(fileSha ? "GitHubの既存ファイルを上書き更新したよ！" : "GitHubに新規ファイルをコミットしたよ！");

            } catch (err) {
                console.error(err);
                showToast(`エラー: ${err.message}`);
            } finally {
                // UI状態を元に戻す
                commitBtn.disabled = false;
                btnText.textContent = "GitHubに保存（新規/上書き）";
            }
        }

        // ==========================================
        //  ファイル保存（エクスポート/インポート）
        // ==========================================

        function exportMermaidFile() {
            const code = editor.value;
            if (!code.trim()) {
                showToast("保存するコードがありません。");
                return;
            }

            const isTable = isMarkdownTable(code);
            const extension = isTable ? 'md' : 'mermaid';

            const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `diagram-${Date.now()}.${extension}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast("ファイルをローカルに保存したよ！");
        }

        function importMermaidFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                editor.value = e.target.result;
                updateLineNumbers();
                updateStats();
                renderDiagram(true);
                showToast("ファイルからコードをインポートしたよ！");
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // SVG エクスポート処理
        function exportSVG() {
            const svgElement = previewContainer.querySelector('svg');
            if (!svgElement) {
                showToast("出力する図表が存在しません。");
                return;
            }

            try {
                const isTransparent = document.getElementById('transparent-bg').checked;
                const clone = svgElement.cloneNode(true);
                clone.removeAttribute('style');
                clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                
                if (!isTransparent) {
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("fill", "#FFFFFF");
                    
                    const viewBox = clone.getAttribute('viewBox');
                    if (viewBox) {
                        const parts = viewBox.split(/[ ,]+/);
                        if (parts.length === 4) {
                            rect.setAttribute("x", parts[0]);
                            rect.setAttribute("y", parts[1]);
                            rect.setAttribute("width", parts[2]);
                            rect.setAttribute("height", parts[3]);
                        } else {
                            rect.setAttribute("width", "100%");
                            rect.setAttribute("height", "100%");
                        }
                    } else {
                        rect.setAttribute("width", "100%");
                        rect.setAttribute("height", "100%");
                    }
                    clone.insertBefore(rect, clone.firstChild);
                }
                
                const serializer = new XMLSerializer();
                let svgString = serializer.serializeToString(clone);
                
                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = `diagram-${Date.now()}.svg`;
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast("SVGファイルをダウンロードしたよ！");
            } catch (err) {
                console.error(err);
                showToast("SVGの出力に失敗しました。");
            }
        }

        // PNG エクスポート処理
        function exportPNG() {
            const svgElement = previewContainer.querySelector('svg');
            if (!svgElement) {
                showToast("出力する図表が存在しません。");
                return;
            }

            try {
                const isTransparent = document.getElementById('transparent-bg').checked;
                const rect = svgElement.getBoundingClientRect();
                const width = rect.width || parseFloat(svgElement.getAttribute('width')) || 800;
                const height = rect.height || parseFloat(svgElement.getAttribute('height')) || 600;

                const scale = 2.0;
                const canvasWidth = width * scale;
                const canvasHeight = height * scale;

                const clone = svgElement.cloneNode(true);
                clone.setAttribute('width', canvasWidth);
                clone.setAttribute('height', canvasHeight);
                clone.style.width = canvasWidth + 'px';
                clone.style.height = canvasHeight + 'px';

                if (!isTransparent) {
                    const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    bgRect.setAttribute("fill", "#FFFFFF");
                    const viewBox = clone.getAttribute('viewBox');
                    if (viewBox) {
                        const parts = viewBox.split(/[ ,]+/);
                        if (parts.length === 4) {
                            bgRect.setAttribute("x", parts[0]);
                            bgRect.setAttribute("y", parts[1]);
                            bgRect.setAttribute("width", parts[2]);
                            bgRect.setAttribute("height", parts[3]);
                        } else {
                            bgRect.setAttribute("width", "100%");
                            bgRect.setAttribute("height", "100%");
                        }
                    } else {
                        bgRect.setAttribute("width", "100%");
                        bgRect.setAttribute("height", "100%");
                    }
                    clone.insertBefore(bgRect, clone.firstChild);
                }

                const serializer = new XMLSerializer();
                let svgString = serializer.serializeToString(clone);
                
                svgString = svgString.replace(/@import\s+url\([^)]+\);?/g, '');
                svgString = svgString.replace(/@font-face\s*{[^}]+}/g, '');

                const base64Svg = btoa(unescape(encodeURIComponent(svgString)));
                const url = 'data:image/svg+xml;base64,' + base64Svg;
                
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = canvasWidth;
                    canvas.height = canvasHeight;
                    const ctx = canvas.getContext('2d');

                    if (!isTransparent) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    }

                    ctx.drawImage(img, 0, 0, canvasWidth, canvasHeight);
                    
                    try {
                        const pngDataUrl = canvas.toDataURL('image/png');
                        const link = document.createElement('a');
                        link.href = pngDataUrl;
                        link.download = `diagram-${Date.now()}.png`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast("PNGファイルをダウンロードしたよ！");
                    } catch (canvasErr) {
                        console.error(canvasErr);
                        showToast("セキュア環境の制限によりPNG出力に失敗しました。");
                    }
                };
                
                img.onerror = (e) => {
                    console.error("Image loading failed in exportPNG", e);
                    showToast("画像の生成プロセスでエラーが発生しました。");
                };

                img.src = url;

            } catch (err) {
                console.error(err);
                showToast("PNGの出力に失敗しました。");
            }
        }
    </script>
